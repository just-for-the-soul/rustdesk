name: Build Android APK (Flutter Only - Fast)

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - add_esper_sdk
    paths:
      - 'flutter/**'
      - '!flutter/lib/generated_bridge.dart'
      - '!flutter/android/app/src/main/jniLibs/**'

env:
  FLUTTER_VERSION: "3.24.5"
  VERSION: "1.4.5"

jobs:
  build-flutter-only:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: "stable"
        flutter-version: ${{ env.FLUTTER_VERSION }}

    - name: Patch Flutter
      run: |
        cd $(dirname $(dirname $(which flutter)))
        [[ "3.24.5" == "${{ env.FLUTTER_VERSION }}" ]] && \
          git apply ${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff || true

    - name: Check pre-compiled libraries
      run: |
        echo "Checking for pre-compiled native libraries..."
        
        LIBS=(
          "flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so"
          "flutter/android/app/src/main/jniLibs/arm64-v8a/libc++_shared.so"
          "flutter/android/app/src/main/jniLibs/armeabi-v7a/librustdesk.so"
          "flutter/android/app/src/main/jniLibs/armeabi-v7a/libc++_shared.so"
          "flutter/lib/generated_bridge.dart"
        )
        
        MISSING=0
        for lib in "${LIBS[@]}"; do
          if [ ! -f "$lib" ]; then
            echo "❌ Missing: $lib"
            MISSING=$((MISSING + 1))
          else
            SIZE=$(stat -c%s "$lib" | numfmt --to=iec-i 2>/dev/null || echo "unknown")
            echo "✓ Found: $lib ($SIZE)"
          fi
        done
        
        if [ $MISSING -gt 0 ]; then
          echo ""
          echo "❌ Missing $MISSING required files"
          echo "⚠️  Run full build workflow first to generate libraries"
          exit 1
        fi
        
        echo ""
        echo "✓ All pre-compiled libraries present!"

    - name: Build APK (Fast - Flutter Only)
      env:
        SKIP_RUST_BUILD: "1"
      run: |
        echo "════════════════════════════════════════════════════════════"
        echo "  🚀 FAST BUILD MODE"
        echo "  Using pre-compiled Rust libraries"
        echo "  SKIP_RUST_BUILD = $SKIP_RUST_BUILD"
        echo "════════════════════════════════════════════════════════════"
        echo ""
        
        # Gradle настройки
        sed -i "s/org.gradle.jvmargs=-Xmx1024M/org.gradle.jvmargs=-Xmx2g/g" \
          ./flutter/android/gradle.properties
        
        # Показываем библиотеки
        echo "Using libraries:"
        ls -lh flutter/android/app/src/main/jniLibs/*/*.so
        
        echo ""
        echo "Building APK with Flutter..."
        cd flutter
        flutter pub get
        
        # Build с установленной SKIP_RUST_BUILD переменной
        flutter build apk --release --target-platform android-arm64,android-arm
        
        # Результат
        mkdir -p ../signed-apk
        mv build/app/outputs/flutter-apk/app-release.apk \
           ../signed-apk/rustdesk-${{ env.VERSION }}-fast.apk
        
        echo ""
        echo "✓ APK built successfully!"
        ls -lh ../signed-apk/*.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: rustdesk-${{ env.VERSION }}-flutter-only
        path: signed-apk/*.apk
        retention-days: 7

    - name: Build Summary
      if: always()
      run: |
        echo "## 🚀 Fast Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Mode:** Flutter Only (Pre-compiled libraries)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "signed-apk/rustdesk-${{ env.VERSION }}-fast.apk" ]; then
          SIZE=$(stat -c%s "signed-apk/rustdesk-${{ env.VERSION }}-fast.apk" | numfmt --to=iec-i)
          echo "### 📦 APK:" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Time saved:** ~35-40 minutes ⚡" >> $GITHUB_STEP_SUMMARY
        else
          echo "### ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check logs for details" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Build Info:" >> $GITHUB_STEP_SUMMARY
        echo "- Flutter: \`${{ env.FLUTTER_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Version: \`${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
