name: Build Android APK (Flutter Only - Fast)

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - add_esper_sdk
    paths:
      - 'flutter/**'
      - '!flutter/lib/generated_bridge.dart'
      - '.github/workflows/build-android-flutter-only.yml'

env:
  FLUTTER_VERSION: "3.24.5"
  VERSION: "1.4.5"

jobs:
  build-flutter-only:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    # ========================================
    # ДОБАВИТЬ: Установка Java
    # ========================================
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Verify Java Installation
      run: |
        echo "Java version:"
        java -version
        echo ""
        echo "JAVA_HOME: $JAVA_HOME"
        ls -la $JAVA_HOME || echo "JAVA_HOME not set properly"

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: "stable"
        flutter-version: ${{ env.FLUTTER_VERSION }}

    - name: Patch Flutter
      run: |
        cd $(dirname $(dirname $(which flutter)))
        [[ "3.24.5" == "${{ env.FLUTTER_VERSION }}" ]] && \
          git apply ${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff || true

    - name: Check for pre-compiled libraries
      id: check-libs
      run: |
        echo "Checking for pre-compiled native libraries..."
        
        REQUIRED_LIBS=(
          "flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so"
          "flutter/android/app/src/main/jniLibs/arm64-v8a/libc++_shared.so"
          "flutter/android/app/src/main/jniLibs/armeabi-v7a/librustdesk.so"
          "flutter/android/app/src/main/jniLibs/armeabi-v7a/libc++_shared.so"
        )
        
        MISSING=0
        for lib in "${REQUIRED_LIBS[@]}"; do
          if [ ! -f "$lib" ]; then
            echo "❌ Missing: $lib"
            MISSING=$((MISSING + 1))
          else
            echo "✓ Found: $lib ($(stat -c%s "$lib" | numfmt --to=iec-i)B)"
          fi
        done
        
        if [ $MISSING -eq 0 ]; then
          echo "✓ All native libraries found!"
          echo "libs_present=true" >> $GITHUB_OUTPUT
        else
          echo "❌ Missing $MISSING libraries"
          echo "⚠️  Run full build workflow first"
          echo "libs_present=false" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Check for bridge files
      id: check-bridge
      run: |
        echo "Checking for FFI bridge files..."
        
        if [ -f "flutter/lib/generated_bridge.dart" ]; then
          echo "✓ Bridge file found: generated_bridge.dart"
          echo "bridge_present=true" >> $GITHUB_OUTPUT
        else
          echo "❌ Missing: flutter/lib/generated_bridge.dart"
          echo "bridge_present=false" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Build APK (Flutter Only)
      run: |
        echo "╔═══════════════════════════════════════════════════════════╗"
        echo "║   FAST BUILD - Using pre-compiled libraries               ║"
        echo "╚═══════════════════════════════════════════════════════════╝"
        echo ""
        
        # Gradle настройки
        sed -i "s/org.gradle.jvmargs=-Xmx1024M/org.gradle.jvmargs=-Xmx2g/g" \
          ./flutter/android/gradle.properties
        sed -i "s/signingConfigs.release/signingConfigs.debug/g" \
          ./flutter/android/app/build.gradle
        
        # Показываем библиотеки
        echo "Using pre-compiled libraries:"
        ls -lh flutter/android/app/src/main/jniLibs/*/*.so
        
        # Flutter build
        cd flutter
        flutter pub get
        
        echo ""
        echo "Building APK..."
        flutter build apk --release --target-platform android-arm64,android-arm
        
        # Результат
        mkdir -p ../signed-apk
        mv build/app/outputs/flutter-apk/app-release.apk \
           ../signed-apk/rustdesk-${{ env.VERSION }}-universal-fast.apk
        
        echo ""
        echo "✓ APK built successfully!"
        ls -lh ../signed-apk/*.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: rustdesk-${{ env.VERSION }}-flutter-only-apk
        path: signed-apk/*.apk
        retention-days: 7

    - name: Build Summary
      if: always()
      run: |
        echo "## 🚀 Fast Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Build Mode: **Flutter Only (Pre-compiled libraries)**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Time Saved:** ~35-40 minutes" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "signed-apk/rustdesk-${{ env.VERSION }}-universal-fast.apk" ]; then
          APK_SIZE=$(stat -c%s "signed-apk/rustdesk-${{ env.VERSION }}-universal-fast.apk" | numfmt --to=iec-i)
          echo "### 📦 APK Info:" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** \`rustdesk-${{ env.VERSION }}-universal-fast.apk\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Java:** OpenJDK 17 (Temurin)" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔧 Build Configuration:" >> $GITHUB_STEP_SUMMARY
        echo "- **Flutter:** \`${{ env.FLUTTER_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Version:** \`${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
